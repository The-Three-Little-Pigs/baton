name: baton
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.1+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  change_app_package_name: ^1.5.0
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  firebase_storage: ^13.0.6
  flutter_riverpod: ^3.1.0
  google_sign_in: ^6.0.0
  kakao_flutter_sdk: ^1.10.0
  go_router: ^17.1.0
  riverpod_annotation: ^4.0.0
  auto_size_text: ^3.0.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^20.1.0
  image_picker: ^1.2.1
  uuid: ^4.5.3
  flutter_svg: ^2.2.3
  intl: ^0.20.2
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7
  path_provider: ^2.1.5
  
  # --- Drift 관련 추가 ---
  drift: ^2.16.0
  sqlite3: ^2.4.3
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  algoliasearch: ^1.46.2
  flutter_dotenv: ^6.0.0
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.4.1
  logger: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^4.0.0+1
  
  # --- Drift 관련 추가 ---
  drift_dev: ^2.16.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - assets/images/
  fonts:
    - family: PretendardGOV
      fonts:
        - asset: assets/fonts/PretendardGOV-Thin.otf
          weight: 100
        - asset: assets/fonts/PretendardGOV-ExtraLight.otf
          weight: 200
        - asset: assets/fonts/PretendardGOV-Light.otf
          weight: 300
        - asset: assets/fonts/PretendardGOV-Regular.otf
          weight: 400
        - asset: assets/fonts/PretendardGOV-Medium.otf
          weight: 500
        - asset: assets/fonts/PretendardGOV-SemiBold.otf
          weight: 600
        - asset: assets/fonts/PretendardGOV-Bold.otf
          weight: 700
        - asset: assets/fonts/PretendardGOV-ExtraBold.otf
          weight: 800
        - asset: assets/fonts/PretendardGOV-Black.otf
          weight: 900